name: Supabase Weekly Backup

# Supabase Freeプランは日次バックアップが付かないため、GitHub Actionsで週次バックアップを取得する。
# pg_dumpでスキーマ+データをダンプし、gzip圧縮してArtifactに90日保持する。
# 重大障害時はこのArtifactからpsqlでレストアする。

on:
  schedule:
    - cron: '0 17 * * 0'  # 毎週日曜 JST 02:00 = UTC 17:00
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install PostgreSQL 16 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Dump database
        run: |
          set -e
          TIMESTAMP=$(date -u +%Y%m%d-%H%M)
          FILENAME="bgm-backup-${TIMESTAMP}.sql.gz"

          pg_dump \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --format=plain \
            "$DATABASE_URL" | gzip -9 > "$FILENAME"

          SIZE=$(du -h "$FILENAME" | cut -f1)
          echo "Backup file: $FILENAME ($SIZE)"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: bgm-backup-*.sql.gz
          retention-days: 90

      - name: Report result
        if: success()
        run: |
          echo "## Backup completed" >> $GITHUB_STEP_SUMMARY
          echo "- File: ${FILENAME}" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 90 days" >> $GITHUB_STEP_SUMMARY
          echo "- Restore: download artifact and run \`gunzip -c FILE | psql \$DATABASE_URL\`" >> $GITHUB_STEP_SUMMARY

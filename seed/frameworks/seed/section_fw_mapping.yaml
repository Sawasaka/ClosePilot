# 用途: Rookie Craft — 各セクションの「おすすめFW道具棚」
# type:
#   recommended  = ★推奨（3-5個）— セクションの問いに直結するFW
#   supplementary = ◇補助（2-3個）— 深掘り・別角度の分析用
# bulk_library:
#   セクションに一括表示される施策/テクニックライブラリ

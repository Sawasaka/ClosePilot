# ============================================================
# 営業戦略フレームワーク辞書（50選）
# ============================================================
# 用途: RookieSmart CRAFT マスタデータ
# 更新: 2025-02
# ============================================================

meta:
  category: 営業戦略
  total_frameworks: 50

frameworks:

  # ========================================
  # 外部環境・市場構造 (1-8)
  # ========================================

  - id: F-PEST
    name: PEST Analysis
    name_ja: PEST分析
    category: 外部環境・市場構造
    purpose: "マクロ環境4因子から市場の追い風・逆風を特定する"
    elements:
      - key: Political
        ja: 政治・法規制
      - key: Economic
        ja: 経済動向
      - key: Social
        ja: 社会・人口動態
      - key: Technological
        ja: 技術トレンド
    level: intermediate
    pitfall: "要因の羅列で終わり『だから何をする』が抜けがち"
    combo: [F-5FORCES, F-SWOT]

  - id: F-PESTLE
    name: PESTLE Analysis
    name_ja: PESTLE分析
    category: 外部環境・市場構造
    purpose: "PESTに法的・環境的要因を加え規制産業を包括的に分析する"
    elements:
      - key: Political
        ja: 政治
      - key: Economic
        ja: 経済
      - key: Social
        ja: 社会
      - key: Technological
        ja: 技術
      - key: Legal
        ja: 法的要因
      - key: Environmental
        ja: 環境要因
    level: intermediate
    pitfall: "6因子すべてを均等に書こうとして焦点がぼやける"
    combo: [F-PEST, F-SCENARIO]

  - id: F-SCENARIO
    name: Scenario Planning
    name_ja: シナリオプランニング
    category: 外部環境・市場構造
    purpose: "不確実性の高い環境変化を複数シナリオで想定し戦略の柔軟性を確保する"
    elements:
      - key: Driving Forces
        ja: 駆動要因の特定
      - key: Critical Uncertainties
        ja: 重要な不確実性
      - key: Scenario Matrix
        ja: シナリオマトリクス
      - key: Implications
        ja: 各シナリオの示唆
      - key: Strategic Options
        ja: 戦略オプション
    level: advanced
    pitfall: "シナリオ作成が目的化し具体的なアクションプランに落ちない"
    combo: [F-PESTLE, F-SWOT]

  - id: F-LIFECYCLE
    name: Market Lifecycle
    name_ja: 市場ライフサイクル分析
    category: 外部環境・市場構造
    purpose: "市場の成熟度に応じた最適な営業・マーケ施策を選定する"
    elements:
      - key: Introduction
        ja: 導入期
      - key: Growth
        ja: 成長期
      - key: Maturity
        ja: 成熟期
      - key: Decline
        ja: 衰退期
    level: intermediate
    pitfall: "自社製品と市場のライフサイクルを混同する"
    combo: [F-BCG, F-ANSOFF]

  - id: F-5FORCES
    name: Porter's Five Forces
    name_ja: 5フォース分析
    category: 外部環境・市場構造
    purpose: "業界の収益構造と競争圧力を5つの力で評価する"
    elements:
      - key: New Entrants
        ja: 新規参入の脅威
      - key: Buyer Power
        ja: 買い手の交渉力
      - key: Supplier Power
        ja: 売り手の交渉力
      - key: Substitutes
        ja: 代替品の脅威
      - key: Rivalry
        ja: 既存競合の競争
    level: intermediate
    pitfall: "静的な分析に留まり競争環境の変化スピードを見落とす"
    combo: [F-3C, F-BARRIER]

  - id: F-STRAT-GROUP
    name: Strategic Group Analysis
    name_ja: 戦略グループ分析
    category: 外部環境・市場構造
    purpose: "業界内の競合をグループ化し自社の競争ポジションと移動障壁を把握する"
    elements:
      - key: Grouping Axes
        ja: グルーピング軸の選定
      - key: Strategic Groups
        ja: 戦略グループの特定
      - key: Mobility Barriers
        ja: 移動障壁の評価
      - key: Position Gap
        ja: ポジションギャップ
    level: advanced
    pitfall: "軸の選定が恣意的だと分析結果が歪む"
    combo: [F-5FORCES, F-POS-MAP]

  - id: F-BARRIER
    name: Entry Barrier Analysis
    name_ja: 参入障壁分析
    category: 外部環境・市場構造
    purpose: "市場参入の難易度を評価し自社の参入戦略または防衛策を設計する"
    elements:
      - key: Economies of Scale
        ja: 規模の経済
      - key: Brand Loyalty
        ja: ブランドロイヤルティ
      - key: Switching Costs
        ja: スイッチングコスト
      - key: Capital Requirements
        ja: 必要資本
      - key: Regulatory Barriers
        ja: 規制上の障壁
    level: intermediate
    pitfall: "参入障壁は時間とともに変化するため定期的な再評価が必要"
    combo: [F-5FORCES, F-STRAT-GROUP]

  - id: F-COMP-MAP
    name: Competitive Mapping
    name_ja: 競争地図／競合マッピング
    category: 外部環境・市場構造
    purpose: "主要競合の機能・価格・ポジションを可視化し差別化の余地を発見する"
    elements:
      - key: Competitor List
        ja: 競合リストアップ
      - key: Evaluation Criteria
        ja: 評価軸の設定
      - key: Feature Comparison
        ja: 機能比較
      - key: Position Plot
        ja: ポジションプロット
    level: intermediate
    pitfall: "現在の競合だけ見て潜在的な異業種参入を見逃す"
    combo: [F-POS-MAP, F-5FORCES]

  # ========================================
  # 誰に（ターゲティング）(9-17)
  # ========================================

  - id: F-STP
    name: STP (Segmentation / Targeting / Positioning)
    name_ja: STP分析
    category: 誰に
    purpose: "市場を細分化し狙うべきセグメントと立ち位置を明確にする"
    elements:
      - key: Segmentation
        ja: セグメンテーション
      - key: Targeting
        ja: ターゲティング
      - key: Positioning
        ja: ポジショニング
    level: beginner
    pitfall: "セグメントを細かくしすぎて規模が取れなくなる"
    combo: [F-PERSONA, F-POS-MAP]

  - id: F-TAM
    name: TAM / SAM / SOM
    name_ja: TAM／SAM／SOM分析
    category: 誰に
    purpose: "市場規模を3層で把握し現実的に獲得可能な売上を見積もる"
    elements:
      - key: TAM
        ja: 最大市場規模
      - key: SAM
        ja: 到達可能市場規模
      - key: SOM
        ja: 獲得可能市場規模
    level: intermediate
    pitfall: "TAMの数字だけ大きく見せてSOMの根拠が薄いと説得力ゼロ"
    combo: [F-STP, F-ICP]

  - id: F-ICP
    name: Ideal Customer Profile
    name_ja: ICP（理想顧客プロファイル）
    category: 誰に
    purpose: "最もLTVが高く獲得コストが低い理想の企業像を定義する"
    elements:
      - key: Firmographics
        ja: 企業属性（業界/規模/地域）
      - key: Technographics
        ja: 技術スタック
      - key: Pain Points
        ja: 抱える課題
      - key: Buying Behavior
        ja: 購買行動パターン
      - key: Success Indicators
        ja: 成功指標
    level: intermediate
    pitfall: "既存顧客の平均像＝理想像ではない（上位20%を分析せよ）"
    combo: [F-PERSONA, F-ABM-TARGET]

  - id: F-PERSONA
    name: Buyer Persona
    name_ja: ペルソナ
    category: 誰に
    purpose: "ターゲット担当者の行動・感情・意思決定パターンを人物像として具体化する"
    elements:
      - key: Demographics
        ja: デモグラフィック
      - key: Goals
        ja: 目標・ゴール
      - key: Challenges
        ja: 課題・悩み
      - key: Information Sources
        ja: 情報収集チャネル
      - key: Decision Criteria
        ja: 意思決定基準
    level: beginner
    pitfall: "妄想ペルソナになりがち。実際のインタビューデータで裏付ける"
    combo: [F-ICP, F-CJ]

  - id: F-6R
    name: 6R Framework
    name_ja: 6R分析
    category: 誰に
    purpose: "ターゲット市場を6つの評価軸でスコアリングし優先順位を付ける"
    elements:
      - key: Realistic Scale
        ja: 有効な市場規模
      - key: Rate of Growth
        ja: 成長率
      - key: Rival
        ja: 競合状況
      - key: Reach
        ja: 到達可能性
      - key: Rank
        ja: 優先度
      - key: Response
        ja: 測定可能性
    level: intermediate
    pitfall: "6軸すべてを均等に重み付けすると差がつかない"
    combo: [F-STP, F-SEG-MATRIX]

  - id: F-CJ
    name: Customer Journey Map
    name_ja: カスタマージャーニーマップ
    category: 誰に
    purpose: "顧客の認知から購買・継続までの体験を時系列で可視化しタッチポイントを最適化する"
    elements:
      - key: Awareness
        ja: 認知フェーズ
      - key: Consideration
        ja: 検討フェーズ
      - key: Decision
        ja: 意思決定フェーズ
      - key: Purchase
        ja: 購買フェーズ
      - key: Retention
        ja: 継続・拡大フェーズ
    level: intermediate
    pitfall: "自社視点のファネルと混同し顧客の実体験が反映されない"
    combo: [F-PERSONA, F-FUNNEL]

  - id: F-SEG-MATRIX
    name: Segment Attractiveness × Fit Matrix
    name_ja: セグメント魅力度×自社適合度マトリクス
    category: 誰に
    purpose: "複数セグメントを市場魅力度と自社フィットの2軸で評価し注力先を決める"
    elements:
      - key: Attractiveness Criteria
        ja: 魅力度評価基準
      - key: Fit Criteria
        ja: 適合度評価基準
      - key: Scoring
        ja: スコアリング
      - key: Priority Matrix
        ja: 優先度マトリクス
    level: advanced
    pitfall: "評価基準の選定と重み付けに恣意性が入ると結論が歪む"
    combo: [F-6R, F-GE]

  - id: F-ABM-TARGET
    name: ABM Target Design
    name_ja: ABMターゲット設計
    category: 誰に
    purpose: "ABM3層（1:1/1:Few/1:Many）のターゲットリストと施策を設計する"
    elements:
      - key: 1:1 Strategic
        ja: 個別戦略アカウント
      - key: 1:Few Cluster
        ja: クラスター型アカウント群
      - key: 1:Many Programmatic
        ja: プログラマティック対象群
      - key: Account Scoring
        ja: アカウントスコアリング
    level: advanced
    pitfall: "1:1に注力しすぎてパイプライン全体のボリュームが不足する"
    combo: [F-ICP, F-FUNNEL]

  - id: F-PROBLEM-CLUSTER
    name: Problem Clustering
    name_ja: 課題クラスタリング
    category: 誰に
    purpose: "業界×職種×課題の3軸で顧客課題を分類し刺さるメッセージを設計する"
    elements:
      - key: Industry Axis
        ja: 業界軸
      - key: Role Axis
        ja: 職種軸
      - key: Problem Axis
        ja: 課題軸
      - key: Cluster Map
        ja: クラスターマップ
      - key: Message Fit
        ja: メッセージ適合
    level: intermediate
    pitfall: "課題の粒度がバラバラだとクラスターが意味をなさない"
    combo: [F-ICP, F-MESSAGING]

  # ========================================
  # 何を（価値提案）(18-26)
  # ========================================

  - id: F-VP
    name: Value Proposition
    name_ja: バリュープロポジション
    category: 何を
    purpose: "顧客に提供する独自の価値を一行で言語化する"
    elements:
      - key: Target Customer
        ja: 対象顧客
      - key: Problem
        ja: 解決する課題
      - key: Unique Value
        ja: 独自の提供価値
    level: beginner
    pitfall: "機能説明になりがち。顧客が得る成果（Outcome）で語る"
    combo: [F-VPC, F-POS-MAP]

  - id: F-VPC
    name: Value Proposition Canvas
    name_ja: VPキャンバス
    category: 何を
    purpose: "顧客のJobs/Pains/Gainsと自社提供物のフィットを構造的に検証する"
    elements:
      - key: Customer Jobs
        ja: 顧客のやるべきこと
      - key: Pains
        ja: 顧客の痛み
      - key: Gains
        ja: 顧客の利得
      - key: Pain Relievers
        ja: 痛みの解消策
      - key: Gain Creators
        ja: 利得の創出策
      - key: Products & Services
        ja: 製品・サービス
    level: intermediate
    pitfall: "自社都合のGain Creatorを先に書いて顧客Jobsとの整合が取れない"
    combo: [F-VP, F-JTBD-STRAT]

  - id: F-JTBD-STRAT
    name: Jobs To Be Done (Strategy Context)
    name_ja: JTBD（戦略文脈）
    category: 何を
    purpose: "顧客が『雇う』ジョブを起点に製品の価値設計と競合定義をやり直す"
    elements:
      - key: Functional Job
        ja: 機能的ジョブ
      - key: Emotional Job
        ja: 感情的ジョブ
      - key: Social Job
        ja: 社会的ジョブ
      - key: Job Statement
        ja: ジョブステートメント
    level: intermediate
    pitfall: "ジョブを抽象化しすぎると何でもありになる。具体的な状況を添える"
    combo: [F-VPC, F-KANO]

  - id: F-4P
    name: Marketing Mix 4P
    name_ja: 4P分析
    category: 何を
    purpose: "製品・価格・流通・販促の4要素で市場投入戦略を設計する"
    elements:
      - key: Product
        ja: 製品
      - key: Price
        ja: 価格
      - key: Place
        ja: 流通チャネル
      - key: Promotion
        ja: 販売促進
    level: beginner
    pitfall: "売り手視点に偏りがち。4Cと併用して顧客視点を補う"
    combo: [F-4C, F-STP]

  - id: F-7P
    name: Extended Marketing Mix 7P
    name_ja: 7P分析
    category: 何を
    purpose: "4Pに人・プロセス・物的証拠を追加しサービス業の施策を網羅する"
    elements:
      - key: Product
        ja: 製品
      - key: Price
        ja: 価格
      - key: Place
        ja: 流通
      - key: Promotion
        ja: 販促
      - key: People
        ja: 人材
      - key: Process
        ja: 業務プロセス
    level: intermediate
    pitfall: "7要素すべてを同時に変えると効果測定ができない"
    combo: [F-4P, F-CJ]

  - id: F-4C
    name: 4C Analysis
    name_ja: 4C分析
    category: 何を
    purpose: "顧客視点で価値・コスト・利便性・コミュニケーションを設計する"
    elements:
      - key: Customer Value
        ja: 顧客にとっての価値
      - key: Cost
        ja: 顧客の総コスト
      - key: Convenience
        ja: 入手の利便性
      - key: Communication
        ja: 双方向コミュニケーション
    level: beginner
    pitfall: "4Pとの対応関係だけで満足し顧客インサイトが浅いまま"
    combo: [F-4P, F-VP]

  - id: F-KANO
    name: Kano Model
    name_ja: 狩野モデル
    category: 何を
    purpose: "機能を当たり前/性能/魅力品質に分類し開発・訴求の優先度を決める"
    elements:
      - key: Must-be Quality
        ja: 当たり前品質
      - key: One-dimensional Quality
        ja: 性能品質（一元的）
      - key: Attractive Quality
        ja: 魅力品質
      - key: Indifferent
        ja: 無関心品質
    level: intermediate
    pitfall: "時間経過で魅力品質→当たり前品質に移行する点を見落とす"
    combo: [F-VPC, F-PRICE-DESIGN]

  - id: F-MESSAGING
    name: Messaging Framework
    name_ja: メッセージングフレームワーク
    category: 何を
    purpose: "問題→影響→解決→証拠の流れでセグメント別の訴求メッセージを構築する"
    elements:
      - key: Problem Statement
        ja: 課題の提示
      - key: Impact
        ja: 放置した場合の影響
      - key: Solution
        ja: 解決策の提示
      - key: Proof
        ja: 証拠・実績
    level: intermediate
    pitfall: "全セグメント共通のメッセージで済ませると刺さらない"
    combo: [F-VP, F-PROBLEM-CLUSTER]

  - id: F-PRICE-DESIGN
    name: Pricing Design (Good-Better-Best)
    name_ja: 価格設計（Good-Better-Best）
    category: 何を
    purpose: "松竹梅3段階の価格帯を設計しアップセルの導線を組み込む"
    elements:
      - key: Good (Entry)
        ja: エントリープラン
      - key: Better (Standard)
        ja: スタンダードプラン
      - key: Best (Premium)
        ja: プレミアムプラン
      - key: Anchor Pricing
        ja: アンカー価格設定
      - key: Value Metric
        ja: 課金単位
    level: intermediate
    pitfall: "Betterプランが一番売れるよう設計しないと収益最大化できない"
    combo: [F-KANO, F-UNIT-ECON]

  # ========================================
  # どう勝つ（競争優位）(27-35)
  # ========================================

  - id: F-3C
    name: 3C Analysis
    name_ja: 3C分析
    category: どう勝つ
    purpose: "顧客・競合・自社の3者関係からKSF（成功要因）を導き出す"
    elements:
      - key: Customer
        ja: 顧客ニーズ・市場
      - key: Competitor
        ja: 競合の強み・弱み
      - key: Company
        ja: 自社の強み・弱み
      - key: KSF
        ja: 重要成功要因
    level: beginner
    pitfall: "自社分析が願望になりがち。定量データで裏付ける"
    combo: [F-SWOT, F-5FORCES]

  - id: F-SWOT
    name: SWOT Analysis
    name_ja: SWOT分析
    category: どう勝つ
    purpose: "内部の強み・弱みと外部の機会・脅威を整理し戦略の方向性を導く"
    elements:
      - key: Strengths
        ja: 強み
      - key: Weaknesses
        ja: 弱み
      - key: Opportunities
        ja: 機会
      - key: Threats
        ja: 脅威
    level: beginner
    pitfall: "羅列で終わりがち。必ずTOWSクロスで戦略オプションに昇華する"
    combo: [F-TOWS, F-3C]

  - id: F-TOWS
    name: TOWS Matrix
    name_ja: TOWSマトリクス
    category: どう勝つ
    purpose: "SWOTの4象限をクロスさせ具体的な4つの戦略オプションを導出する"
    elements:
      - key: SO Strategy
        ja: 強み×機会（積極攻勢）
      - key: ST Strategy
        ja: 強み×脅威（差別化）
      - key: WO Strategy
        ja: 弱み×機会（弱点克服）
      - key: WT Strategy
        ja: 弱み×脅威（防衛・撤退）
    level: intermediate
    pitfall: "4戦略すべてに手を出すとリソース分散する。優先順位を付ける"
    combo: [F-SWOT, F-VRIO]

  - id: F-VRIO
    name: VRIO Framework
    name_ja: VRIO分析
    category: どう勝つ
    purpose: "経営資源を価値・希少性・模倣困難性・組織で評価し持続的競争優位を特定する"
    elements:
      - key: Value
        ja: 価値があるか
      - key: Rarity
        ja: 希少性があるか
      - key: Imitability
        ja: 模倣困難か
      - key: Organization
        ja: 組織で活用できるか
    level: intermediate
    pitfall: "V→R→I→Oの順に評価し途中でNoなら次に進まない"
    combo: [F-CORE-COMP, F-VC]

  - id: F-VC
    name: Value Chain Analysis
    name_ja: バリューチェーン分析
    category: どう勝つ
    purpose: "事業活動を主活動と支援活動に分解し価値創出とコスト構造を可視化する"
    elements:
      - key: Inbound Logistics
        ja: 購買物流
      - key: Operations
        ja: 製造・オペレーション
      - key: Outbound Logistics
        ja: 出荷物流
      - key: Marketing & Sales
        ja: マーケティング・営業
      - key: Service
        ja: サービス
      - key: Support Activities
        ja: 支援活動（HR/技術/調達/管理）
    level: intermediate
    pitfall: "自社だけでなく顧客側のバリューチェーンも見ないと提案が刺さらない"
    combo: [F-VRIO, F-CORE-COMP]

  - id: F-CORE-COMP
    name: Core Competence Analysis
    name_ja: コア・コンピタンス分析
    category: どう勝つ
    purpose: "競合が真似できない自社独自の中核能力を特定し戦略の核に据える"
    elements:
      - key: Customer Benefit
        ja: 顧客便益への貢献
      - key: Competitor Differentiation
        ja: 競合との差別化
      - key: Extendability
        ja: 他市場への展開可能性
    level: intermediate
    pitfall: "『技術力が高い』など曖昧な表現では意味がない。具体的に定義する"
    combo: [F-VRIO, F-PORTER-GENERIC]

  - id: F-PORTER-GENERIC
    name: Porter's Generic Strategies
    name_ja: ポーター基本戦略
    category: どう勝つ
    purpose: "コストリーダーシップ・差別化・集中の3戦略から自社の基本方針を選択する"
    elements:
      - key: Cost Leadership
        ja: コストリーダーシップ
      - key: Differentiation
        ja: 差別化
      - key: Focus (Cost)
        ja: コスト集中
      - key: Focus (Differentiation)
        ja: 差別化集中
    level: intermediate
    pitfall: "中途半端な『Stuck in the Middle』が最も危険。一つを徹底する"
    combo: [F-5FORCES, F-POS-MAP]

  - id: F-POS-MAP
    name: Positioning Map
    name_ja: ポジショニングマップ
    category: どう勝つ
    purpose: "2軸のマップ上で競合と自社の位置を可視化し空白ポジションを発見する"
    elements:
      - key: Axis Selection
        ja: 軸の選定（顧客重視の購買基準）
      - key: Competitor Plot
        ja: 競合プロット
      - key: Own Position
        ja: 自社ポジション
      - key: White Space
        ja: 空白ポジション
    level: intermediate
    pitfall: "自社に有利な軸を恣意的に選ぶと実態と乖離する"
    combo: [F-STP, F-COMP-MAP]

  - id: F-BLUE-OCEAN
    name: Blue Ocean Strategy (ERRC)
    name_ja: ブルーオーシャン戦略
    category: どう勝つ
    purpose: "ERRC（排除/削減/増加/創造）の4アクションで競争のない市場空間を創出する"
    elements:
      - key: Eliminate
        ja: 排除する要素
      - key: Reduce
        ja: 削減する要素
      - key: Raise
        ja: 増加させる要素
      - key: Create
        ja: 創造する要素
      - key: Strategy Canvas
        ja: 戦略キャンバス
    level: advanced
    pitfall: "既存顧客の声だけ聞くとレッドオーシャンの改善にしかならない"
    combo: [F-VPC, F-POS-MAP]

  # ========================================
  # 成長・SaaS (36-41)
  # ========================================

  - id: F-ANSOFF
    name: Ansoff Matrix
    name_ja: アンゾフマトリクス
    category: 成長・SaaS
    purpose: "既存/新規の製品×市場で4つの成長戦略オプションを比較検討する"
    elements:
      - key: Market Penetration
        ja: 市場浸透
      - key: Market Development
        ja: 市場開拓
      - key: Product Development
        ja: 製品開発
      - key: Diversification
        ja: 多角化
    level: intermediate
    pitfall: "多角化はリスク最大。まず市場浸透を最大化したか検証する"
    combo: [F-BCG, F-TAM]

  - id: F-BCG
    name: BCG Matrix
    name_ja: BCGマトリクス
    category: 成長・SaaS
    purpose: "事業・製品を市場成長率×シェアの4象限で分類しリソース配分を最適化する"
    elements:
      - key: Star
        ja: 花形（高成長・高シェア）
      - key: Cash Cow
        ja: 金のなる木（低成長・高シェア）
      - key: Question Mark
        ja: 問題児（高成長・低シェア）
      - key: Dog
        ja: 負け犬（低成長・低シェア）
    level: intermediate
    pitfall: "シェアの定義（金額/数量/セグメント内）で結論が変わる"
    combo: [F-GE, F-ANSOFF]

  - id: F-GE
    name: GE / McKinsey Matrix
    name_ja: GE／マッキンゼーマトリクス
    category: 成長・SaaS
    purpose: "事業の魅力度×競争力を9象限で評価しBCGより精緻にポートフォリオを管理する"
    elements:
      - key: Industry Attractiveness
        ja: 業界魅力度
      - key: Competitive Strength
        ja: 競争上の強さ
      - key: 9-Cell Matrix
        ja: 9象限マトリクス
      - key: Investment Priority
        ja: 投資優先度
    level: advanced
    pitfall: "評価基準が多すぎると主観が入り再現性が低下する"
    combo: [F-BCG, F-SEG-MATRIX]

  - id: F-PLG-SLG
    name: PLG / SLG Strategy
    name_ja: PLG／SLG戦略
    category: 成長・SaaS
    purpose: "プロダクト主導とセールス主導の成長モデルを比較し自社に最適な戦略を選択する"
    elements:
      - key: PLG (Product-Led Growth)
        ja: プロダクト主導成長
      - key: SLG (Sales-Led Growth)
        ja: 営業主導成長
      - key: Hybrid Model
        ja: ハイブリッドモデル
      - key: Conversion Trigger
        ja: 有料転換トリガー
    level: intermediate
    pitfall: "PLGでもエンタープライズ案件は営業が必要。二者択一ではない"
    combo: [F-FUNNEL, F-UNIT-ECON]

  - id: F-UNIT-ECON
    name: Unit Economics
    name_ja: ユニットエコノミクス
    category: 成長・SaaS
    purpose: "LTV/CAC/回収期間/NRRで顧客1単位あたりの収益性を評価する"
    elements:
      - key: LTV
        ja: 顧客生涯価値
      - key: CAC
        ja: 顧客獲得コスト
      - key: Payback Period
        ja: 回収期間
      - key: NRR
        ja: ネット収益維持率
      - key: LTV/CAC Ratio
        ja: LTV/CAC比率
    level: intermediate
    pitfall: "LTV/CAC>3が目安だが業界・ステージで基準は異なる"
    combo: [F-AARRR, F-PRICE-DESIGN]

  - id: F-LANCHESTER
    name: Lanchester Strategy
    name_ja: ランチェスター戦略
    category: 成長・SaaS
    purpose: "市場シェアと競争地位に応じた強者/弱者の戦い方を選択する"
    elements:
      - key: First Law (Linear)
        ja: 第一法則（一騎打ちの法則）
      - key: Second Law (Square)
        ja: 第二法則（集中効果の法則）
      - key: Strong Player Strategy
        ja: 強者の戦略（ミート戦略）
      - key: Weak Player Strategy
        ja: 弱者の戦略（差別化・一点集中）
      - key: Market Share Theory
        ja: 市場シェア理論
    level: intermediate
    pitfall: "自社を『弱者』と決めつけず、セグメント単位で強者になれる領域を探す"
    combo: [F-PORTER-GENERIC, F-STP]

  # ========================================
  # 実行・商談 (42-50)
  # ========================================

  - id: F-FUNNEL
    name: Sales Funnel / Pipeline
    name_ja: セールスファネル／パイプライン
    category: 実行・商談
    purpose: "見込み客の流入から成約までの各ステージ転換率を管理し歩留まりを改善する"
    elements:
      - key: Lead
        ja: リード（見込み客）
      - key: MQL
        ja: マーケ認定リード
      - key: SQL
        ja: 営業認定リード
      - key: Opportunity
        ja: 商談化
      - key: Closed Won
        ja: 成約
    level: beginner
    pitfall: "ステージ定義が曖昧だとパイプラインの数字が信用できなくなる"
    combo: [F-AARRR, F-PDCA-KPI]

  - id: F-AIDMA
    name: AIDMA
    name_ja: AIDMA
    category: 実行・商談
    purpose: "顧客の購買心理プロセスを5段階で捉え各段階の施策を設計する"
    elements:
      - key: Attention
        ja: 注目
      - key: Interest
        ja: 関心
      - key: Desire
        ja: 欲求
      - key: Memory
        ja: 記憶
      - key: Action
        ja: 行動
    level: beginner
    pitfall: "デジタル時代はAISASの方が適合する場合が多い"
    combo: [F-AISAS, F-CJ]

  - id: F-AISAS
    name: AISAS
    name_ja: AISAS
    category: 実行・商談
    purpose: "デジタル時代の購買行動（検索・共有含む）に対応した施策を設計する"
    elements:
      - key: Attention
        ja: 注目
      - key: Interest
        ja: 関心
      - key: Search
        ja: 検索
      - key: Action
        ja: 行動
      - key: Share
        ja: 共有
    level: intermediate
    pitfall: "Share→Attentionのループを意識しないとバイラルが生まれない"
    combo: [F-AIDMA, F-CJ]

  - id: F-AARRR
    name: AARRR (Pirate Metrics)
    name_ja: AARRR（海賊指標）
    category: 実行・商談
    purpose: "SaaS/サブスクのグロースを獲得→活性→継続→紹介→収益の5段階KPIで管理する"
    elements:
      - key: Acquisition
        ja: 獲得
      - key: Activation
        ja: 活性化
      - key: Retention
        ja: 継続
      - key: Referral
        ja: 紹介
      - key: Revenue
        ja: 収益
    level: intermediate
    pitfall: "全指標を同時に改善しようとせず最もボトルネックの1つに集中する"
    combo: [F-UNIT-ECON, F-FUNNEL]

  - id: F-PIPELINE-STRAT
    name: Pipeline Strategy
    name_ja: パイプライン戦略
    category: 実行・商談
    purpose: "パイプラインの量×質×速度を最適化し予測精度と達成確度を高める"
    elements:
      - key: Pipeline Coverage
        ja: パイプラインカバレッジ率
      - key: Stage Velocity
        ja: ステージ別進捗速度
      - key: Win Rate
        ja: 受注率
      - key: Deal Size
        ja: 平均案件単価
      - key: Pipeline Hygiene
        ja: パイプライン衛生管理
    level: intermediate
    pitfall: "カバレッジ3倍が目安だが質の低い案件で水増しすると逆効果"
    combo: [F-FUNNEL, F-FORECAST-STRAT]

  - id: F-FORECAST-STRAT
    name: Sales Forecast Strategy
    name_ja: セールスフォーキャスト戦略
    category: 実行・商談
    purpose: "複数の予測手法を組み合わせ売上着地の精度を高める"
    elements:
      - key: Bottom-up Forecast
        ja: ボトムアップ予測（案件積上げ）
      - key: Top-down Forecast
        ja: トップダウン予測（市場ベース）
      - key: Historical Trend
        ja: 過去トレンド分析
      - key: Weighted Pipeline
        ja: 加重パイプライン
      - key: Commit / Upside / Best Case
        ja: コミット／アップサイド／ベストケース
    level: intermediate
    pitfall: "営業の楽観バイアスを排除するため複数手法のクロスチェックが必須"
    combo: [F-PIPELINE-STRAT, F-PDCA-KPI]

  - id: F-PDCA-KPI
    name: PDCA + KPI Tree
    name_ja: PDCA＋KPIツリー
    category: 実行・商談
    purpose: "KPIを因数分解しPDCAサイクルで継続的に営業プロセスを改善する"
    elements:
      - key: Plan
        ja: 計画（KPI設定）
      - key: Do
        ja: 実行（活動量管理）
      - key: Check
        ja: 検証（KPI対実績）
      - key: Act
        ja: 改善（ボトルネック対策）
      - key: KPI Tree
        ja: KPIツリー（因数分解）
    level: intermediate
    pitfall: "KPIが多すぎると管理コストが目的を上回る。3-5個に絞る"
    combo: [F-FUNNEL, F-UNIT-ECON]

  - id: F-WIN-LOSS-STRAT
    name: Win/Loss Analysis
    name_ja: Win／Loss分析
    category: 実行・商談
    purpose: "受注・失注案件を体系的に分析し勝ちパターンと負けパターンを抽出する"
    elements:
      - key: Win Pattern
        ja: 受注パターンの特定
      - key: Loss Pattern
        ja: 失注パターンの特定
      - key: Root Cause
        ja: 根本原因分析
      - key: Competitive Factor
        ja: 競合要因分析
      - key: Action Plan
        ja: 改善アクションプラン
    level: intermediate
    pitfall: "営業の自己申告だけでなく顧客への直接ヒアリングを必ず含める"
    combo: [F-PIPELINE-STRAT, F-3C]

  - id: F-DASHBOARD-STRAT
    name: Sales Dashboard Strategy
    name_ja: セールスダッシュボード戦略
    category: 実行・商談
    purpose: "意思決定に直結するダッシュボードを設計し営業組織のデータドリブン経営を実現する"
    elements:
      - key: Strategic KPIs
        ja: 戦略KPI（売上/利益/シェア）
      - key: Pipeline Metrics
        ja: パイプライン指標
      - key: Activity Metrics
        ja: 活動量指標
      - key: Leading Indicators
        ja: 先行指標
      - key: Lagging Indicators
        ja: 遅行指標
    level: intermediate
    pitfall: "指標の羅列ではなく『次のアクション』が見えるダッシュボードにする"
    combo: [F-PDCA-KPI, F-FORECAST-STRAT]

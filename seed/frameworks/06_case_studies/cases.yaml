meta:
  category: ケーススタディ
  total_cases: 30
  description: 'ハーバードBSケースメソッド的アプローチ。

    「状況理解 → フレーム適用 → 戦略提案 → 根拠/実例」の流れで学ぶ。

    テーマ・業界・成功/失敗が偏らないよう30社を厳選。

    '
  difficulty_distribution:
    beginner: 5
    intermediate: 13
    advanced: 12
case_analysis_method:
  steps:
  - step: 1
    name: 前提確認
    description: 業界、企業規模、時代背景、登場人物を整理
  - step: 2
    name: 論点特定
    description: 何が問題か。何を解決すべきか
  - step: 3
    name: 仮説構築
    description: なぜその問題が起きているか（根因仮説）
  - step: 4
    name: フレームワーク適用（複数）
    description: 3C, SWOT, 5Forces, STP 等を組み合わせて分析
  - step: 5
    name: 打ち手提案
    description: 具体的な戦略・施策を提案
  - step: 6
    name: リスク分析
    description: 提案の前提崩れ、副作用を検討
  - step: 7
    name: 実行計画 / KPI
    description: 誰が、いつまでに、何を、どの指標で測るか
cases:
- id: CASE-KODAK
  seq: 1
  title: Kodak — デジタルシフトに乗り遅れた巨人
  theme: イノベーションのジレンマ
  industry: 写真/イメージング
  era: 1990s〜2012
  level: intermediate
  summary: '世界初のデジタルカメラを自社で発明（1975年）しながら、

    フィルム事業のカニバリゼーションを恐れて本格参入を遅らせた。

    デジタル化の波に乗れず、2012年に経営破綻。

    技術を持ちながらビジネスモデル転換ができなかった典型例。

    '
  key_questions:
  - なぜ技術を持っていたのに転換できなかったのか？
  - 既存事業の収益が大きい時、どうイノベーションを進めるべきか？
  - 経営層の意思決定バイアスは何だったか？
  applicable_frameworks:
  - F-SWOT
  - F-5FORCES
  - F-ANSOFF
  - F-BLUE-OCEAN
  - F-BMC
  learning_points:
  - イノベーションのジレンマ（Clayton Christensen）の教科書的事例
  - カニバリゼーション回避バイアスが致命的な判断遅延を生む
  - 収益構造の転換は技術ではなくビジネスモデルの問題である
- id: CASE-NOKIA
  seq: 2
  title: Nokia — 携帯電話王者の陥落
  theme: プラットフォーム戦略の失敗と組織文化
  industry: 通信/テクノロジー
  era: 2007〜2013
  level: advanced
  summary: '世界の携帯電話市場でシェア1位だったNokiaは、

    iPhoneの登場（2007年）後、スマートフォンへの転換に失敗。

    Symbian OSへの固執とハードウェア思考が足枷となり、

    2013年にMicrosoftに携帯事業を売却する結末を迎えた。

    '
  key_questions:
  - ハードウェア思考からプラットフォーム思考への転換はなぜ遅れたか？
  - 組織文化（恐怖の文化）がイノベーションを阻害した構造は？
  - Symbian/MeeGo/Windows Phoneと迷走したOS戦略の分岐点はどこだったか？
  applicable_frameworks:
  - F-3C
  - F-5FORCES
  - F-7S
  - F-STAR-MODEL
  learning_points:
  - 技術力だけでは勝てない。エコシステム/プラットフォーム戦略の重要性
  - 組織内の心理的安全性が欠如すると、悪い情報が上がらない
  - 市場の変曲点では、シェアではなくスピードが生存を決める
- id: CASE-DISNEY-ROLE
  seq: 3
  title: Disney — 清掃員ではなく『キャスト』
  theme: 役割定義とミッション設計
  industry: テーマパーク/エンターテインメント
  level: beginner
  summary: 'Disneyではパーク内で働く全員を「キャスト」と呼ぶ。

    清掃員も「ゲストに魔法の体験を届ける役割」として定義。

    役割の言い方・位置づけを変えることで、

    従業員のモチベーションと顧客満足の両方を向上させた。

    '
  key_questions:
  - なぜ同じ仕事でも、呼び方で行動が変わるのか？
  - ミッションと日常業務をどう接続するか？
  - 顧客体験の一貫性を数万人規模の組織でどう担保するか？
  applicable_frameworks:
  - F-STAR-MODEL
  - F-MOTIVATION
  - F-SERVANT
  - F-7S
  learning_points:
  - Job Title / Role Definition がアイデンティティと行動を規定する
  - 内発的動機（Purpose）の設計がエンゲージメントを生む
  - ミッション（魔法の体験）→ 行動基準 → 日々の業務 の接続設計が鍵
- id: CASE-AI-SALES-FAILURE
  seq: 4
  title: AIエージェント導入の落とし穴 — 現場を見ない変革
  theme: 現場不理解によるテクノロジー導入失敗
  industry: SaaS/テクノロジー
  level: advanced
  summary: 'AI/テクノロジー企業がAIエージェント（自動営業、自動CS等）を

    自社プロダクトとして導入・販売するも、

    顧客企業の現場業務プロセスやインセンティブ構造を理解せずに

    導入を進めたため、現場が使わない/成果が出ない事例が続出。

    '
  key_questions:
  - 技術の優秀さと現場の採用率は何が違うのか？
  - 変革推進者（Champion）と現場オペレーターの温度差をどう埋めるか？
  - 導入前に何を検証すべきだったか？
  applicable_frameworks:
  - F-JTBD
  - F-MEDDPICC
  - F-STAR-MODEL
  - F-SL
  - F-MOTIVATION
  learning_points:
  - 技術は手段であり、業務プロセスとインセンティブの設計が先
  - Champion だけでなく End User の Job / Pain / Workflow を理解する
  - 変革管理（Change Management）なしの技術導入は失敗する
- id: CASE-SALESFORCE
  seq: 5
  title: Salesforce — SaaSとカスタマーサクセスの創造
  theme: 新市場創造とカスタマーサクセス
  industry: SaaS/CRM
  era: 1999〜現在
  level: intermediate
  summary: 'Salesforceは「No Software」を掲げ、オンプレミスCRMからクラウドへの

    パラダイムシフトを起こした。サブスクリプションモデルの成功の鍵は

    「売って終わり」ではなく「カスタマーサクセス」で継続価値を提供し続けること。

    営業プロセスの型化とCSの両輪がスケールの基盤となった。

    '
  key_questions:
  - なぜ『No Software』というポジショニングが刺さったのか？
  - カスタマーサクセスが収益モデルにどう接続しているか？
  - 大企業市場とSMB市場で営業モデルをどう使い分けたか？
  applicable_frameworks:
  - F-STP
  - F-VP
  - F-BLUE-OCEAN
  - F-UNIT-ECON
  - F-SPICED
  learning_points:
  - ポジショニング（STP）の切れ味が市場を創る
  - サブスク = LTV勝負 = カスタマーサクセスが生命線
  - 営業プロセスの型化（MEDDIC的管理）がスケールの基盤
- id: CASE-TOYOTA-LEAN
  seq: 6
  title: Toyota Production System — リーンの原型
  theme: プロセス改善と現場の文化
  industry: 製造
  era: 1950s〜現在
  level: intermediate
  summary: 'トヨタ生産方式（TPS）は「ジャストインタイム」「自働化」「カイゼン」を柱に

    世界の製造業の標準を書き換えた。

    現場の全員が品質と効率に責任を持つ文化が競争力の源泉。

    仕組みの模倣は容易だが、文化の模倣は困難という点が本質的な学び。

    '
  key_questions:
  - なぜ模倣が難しいのか？（技術ではなく文化が核）
  - 営業組織に応用するなら何が転用できるか？
  - 標準化と改善は矛盾しないのか？両立の鍵は何か？
  applicable_frameworks:
  - F-5WHYS
  - F-KPI-TREE
  - F-RACI
  - F-7S
  learning_points:
  - 仕組み（ツール）だけでなく文化（マインドセット）がセットで機能する
  - 現場への権限委譲と標準化は矛盾しない
  - 5 Whys は営業課題の根因分析にも直接転用可能
- id: CASE-AMAZON
  seq: 7
  title: Amazon — Leadership Principlesによる意思決定の一貫性
  theme: リーダーシップ原則と組織文化
  industry: Eコマース/テクノロジー
  level: advanced
  summary: 'Amazonの16のリーダーシップ原則（Customer Obsession, Ownership,

    Dive Deep, Bias for Action 等）は採用・評価・日常の意思決定すべてに

    埋め込まれている。これが巨大組織でも一貫した判断基準を維持する仕組み。

    原則を「飾り」にせず行動に直結させる設計が最大の学び。

    '
  key_questions:
  - 行動原則はどうすれば『お飾り』にならず実際の行動を変えるか？
  - 営業組織で同様の行動原則を設計するなら何を置くべきか？
  - 16原則の中で最も組織行動を変えた原則はどれか？その理由は？
  applicable_frameworks:
  - F-7S
  - F-STAR-MODEL
  - F-TRANSFORMATIONAL
  - F-MOTIVATION
  learning_points:
  - 価値観の明文化 × 採用/評価への埋め込み = 文化の再現性
  - Customer Obsession → 営業では顧客起点の行動基準に転用可能
  - 巨大組織での一貫性は、ルールではなく原則（プリンシプル）で担保する
- id: CASE-NETFLIX
  seq: 8
  title: Netflix — DVD→ストリーミング→制作の3段階変革
  theme: ビジネスモデル転換
  industry: メディア/エンターテインメント
  era: 1997〜現在
  level: intermediate
  summary: 'DVDレンタルからストリーミング、さらにオリジナルコンテンツ制作へと

    3度のビジネスモデル転換を果たした。

    市場変化を先読みし、自らカニバリゼーションを仕掛けることで

    既存プレイヤー（Blockbuster等）を駆逐。

    データドリブンな意思決定が各フェーズの成功を支えた。

    '
  key_questions:
  - なぜ自社のDVD事業を自ら破壊できたのか？
  - データドリブン意思決定はどう機能したか？
  - コンテンツ制作への垂直統合の判断根拠は？
  applicable_frameworks:
  - F-ANSOFF
  - F-BLUE-OCEAN
  - F-SCENARIO
  - F-BMC
  - F-UNIT-ECON
  learning_points:
  - 自己破壊（カニバリ）を恐れない経営判断が生存の鍵
  - データ活用で顧客行動を予測し先手を打つ
  - ビジネスモデルは固定ではなく進化させるもの
- id: CASE-APPLE
  seq: 9
  title: Apple — エコシステムで囲い込むプロダクト設計
  theme: エコシステム×プロダクト設計
  industry: テクノロジー/ハードウェア
  era: 2007〜現在
  level: advanced
  summary: 'iPhoneを核にiOS/App Store/iCloud/AirPods等のエコシステムを構築。

    単体製品ではなく体験全体で価値を提供し、

    高いスイッチングコストを生み出した。

    クローズドなプラットフォーム戦略がプレミアム価格を維持する構造を作った。

    '
  key_questions:
  - 単一製品ではなくエコシステムで勝つ戦略はどう設計するか？
  - オープン vs クローズドの判断基準は？
  - プレミアム価格を維持できる構造的な理由は何か？
  applicable_frameworks:
  - F-VRIO
  - F-VC
  - F-PLATFORM
  - F-7P
  - F-BLUE-OCEAN
  learning_points:
  - 製品ではなく体験全体を設計する思考が差別化を生む
  - クローズドエコシステムがスイッチングコストになる
  - プレミアムは機能ではなく体験に宿る
- id: CASE-MICROSOFT
  seq: 10
  title: Microsoft — Nadellaの文化変革とクラウドシフト
  theme: 文化変革×クラウドシフト
  industry: テクノロジー/ソフトウェア
  era: 2014〜現在
  level: advanced
  summary: 'CEO交代で「Know-it-all（知ったかぶり）」文化から

    「Learn-it-all（学ぶ文化）」へ大転換。

    Windows中心主義を捨て、Azure/クラウドへ大胆にシフトし、

    時価総額を3兆ドル超に成長させた。

    トップの言葉と行動の一致が全社の文化変革を駆動した事例。

    '
  key_questions:
  - CEO交代で文化を変えるには何が必要か？
  - 既存の稼ぎ頭（Windows）から新領域（Cloud）への移行をどう進めたか？
  - 競合（AWS）が先行する市場でどうポジションを取ったか？
  - Growth Mindsetを組織に浸透させた具体的な仕組みは？
  applicable_frameworks:
  - F-7S
  - F-KOTTER
  - F-STP
  - F-ANSOFF
  - F-3C
  learning_points:
  - 文化変革はトップの言葉と行動の一致から始まる
  - 既存事業の否定ではなく『拡張』として語ることで社内抵抗を抑える
  - 後発でも顧客セグメント（エンタープライズ）を明確にすれば戦える
- id: CASE-TESLA
  seq: 11
  title: Tesla — DTCとブランドで自動車産業を再定義
  theme: DTC×ブランド×新市場創造
  industry: 自動車/EV
  era: 2003〜現在
  level: intermediate
  summary: 'ディーラーを介さないDTC（直販）モデルでEV市場を開拓。

    ソフトウェアアップデートで購入後も車を進化させる仕組みを作り、

    自動車の概念を「ハードウェア → ソフトウェア」に変えた。

    マーケティング予算をほぼ使わずCEOのパーソナルブランドで認知を獲得。

    '
  key_questions:
  - 既存の流通構造（ディーラー）を迂回する判断の根拠は？
  - ブランド構築にマーケ予算をほぼ使わず成功した理由は？
  - ソフトウェア×ハードウェアの融合戦略は他業界に転用可能か？
  applicable_frameworks:
  - F-STP
  - F-BLUE-OCEAN
  - F-VC
  - F-PLG-SLG
  - F-VP
  learning_points:
  - 流通の常識を疑うことで新しいビジネスモデルが生まれる
  - CEOのパーソナルブランドが広告費を代替する例
  - 購入後も価値が増すプロダクト設計がLTVを最大化する
- id: CASE-ADOBE
  seq: 12
  title: Adobe — パッケージからサブスクリプションへの完全転換
  theme: サブスクリプション転換
  industry: ソフトウェア
  era: 2012〜現在
  level: intermediate
  summary: 'Creative Suiteの売切りモデルからCreative Cloudの月額サブスクに完全移行。

    移行期の3年間は減収を覚悟し、短期の痛みを受け入れた。

    ARRベースで過去最高を更新し続ける構造に転換し、

    SaaS企業としての安定成長基盤を確立した事例。

    '
  key_questions:
  - 短期の減収をどう経営・株主に説明したか？
  - 既存顧客の離脱リスクをどう抑えたか？
  - サブスク化で何が変わり、何が変わらなかったか？
  - 移行完了の判断基準は何だったか？
  applicable_frameworks:
  - F-SUBSCRIPTION
  - F-UNIT-ECON
  - F-ANSOFF
  - F-BMC
  - F-PRICING
  learning_points:
  - ビジネスモデル転換は『短期痛み × 長期利益』のトレードオフ
  - ARR・NRRなどSaaS指標が経営判断の軸になる
  - 既存顧客の移行設計が転換の成否を分ける
- id: CASE-SLACK
  seq: 13
  title: Slack — PLGで営業なしに広がるプロダクト
  theme: PLG（プロダクト主導成長）
  industry: SaaS/コミュニケーション
  era: 2013〜現在
  level: intermediate
  summary: '無料プランでチーム内に浸透し、メッセージ履歴制限で有料化ニーズが発生。

    ボトムアップで全社導入が進む構造を設計した。

    営業チームなしで年間ARR数百億円を達成したPLGの代表例。

    一定規模以降はSLGとのハイブリッドへ移行した戦略転換も含め学びが多い。

    '
  key_questions:
  - PLGが機能するプロダクトの条件は何か？
  - フリーミアムの『壁』をどこに置くのが最適か？
  - PLGとSLG（営業主導）のハイブリッドはどう設計するか？
  applicable_frameworks:
  - F-PLG-SLG
  - F-FREEMIUM
  - F-AARRR
  - F-UNIT-ECON
  - F-AISAS
  learning_points:
  - プロダクト自体がセールスになるPLGの威力
  - フリーミアムの制限設計が有料化率を左右する
  - 一定規模以上ではPLG + SLGのハイブリッドが必要になる
- id: CASE-HUBSPOT
  seq: 14
  title: HubSpot — インバウンドマーケティングという市場を作った
  theme: インバウンドマーケティング創造
  industry: SaaS/MA
  era: 2006〜現在
  level: intermediate
  summary: '「インバウンドマーケティング」という概念を提唱し、

    書籍・ブログ・認定資格で市場を教育。

    自ら作ったカテゴリで第一想起を獲得し、

    SMBのマーケティングツール市場を席巻した。

    教育 → 信頼 → 利用のファネルが長期的な競争優位を作った事例。

    '
  key_questions:
  - 存在しないカテゴリを作る戦略はどう設計するか？
  - 教育コンテンツ → リード → プロダクト利用の導線はどう機能したか？
  - SMBに絞る判断と大手進出のタイミングはどう決めたか？
  applicable_frameworks:
  - F-STP
  - F-ICP
  - F-BLUE-OCEAN
  - F-CJ
  - F-AARRR
  learning_points:
  - カテゴリ創造は最強のポジショニング戦略
  - 教育 → 信頼 → 利用のファネルが長期的な競争優位を作る
  - ターゲットを絞りきることでプロダクトが尖る
- id: CASE-ZOOM
  seq: 15
  title: Zoom — パンデミック下の急成長とスケーリング
  theme: 急成長のオペレーション
  industry: SaaS/コミュニケーション
  era: 2011〜現在
  level: intermediate
  summary: '「ビデオ会議の品質が低い」という単純な課題に集中し、PMFを確立。

    パンデミックでDAU 1000万 → 3億に爆発的成長。

    技術的・組織的・セキュリティ的なスケーリング課題を短期間で克服した。

    危機対応の速度と透明性がブランド信頼を守った事例。

    '
  key_questions:
  - 需要の100倍急増にどうインフラ/組織を対応させたか？
  - セキュリティ問題発生時の危機対応から何を学べるか？
  - 競合（Teams/Meet）が無料で攻めてくる中でどう差別化したか？
  applicable_frameworks:
  - F-PMF
  - F-TAM
  - F-5FORCES
  - F-PIPELINE
  - F-KPI-TREE
  learning_points:
  - PMFが明確なプロダクトは市場変化で爆発する
  - 急成長時は『やらないことを決める』が最重要
  - 危機対応の速度と透明性がブランド信頼を左右する
- id: CASE-STRIPE
  seq: 16
  title: Stripe — 開発者ファーストで決済インフラを制覇

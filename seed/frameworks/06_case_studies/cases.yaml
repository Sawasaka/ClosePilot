  learning_points:
  - ビジネスモデルとバリュエーションの整合性を冷静に見る — ナラティブに惑わされない分析力
  - ユニットエコノミクスが破綻していれば成長は毒になる — 赤字の拡大再生産に陥る構造
  - ガバナンスの欠如が企業価値を一夜で消す — 創業者への監視・牽制機能は不可欠
- id: CASE-UBER
  seq: 29
  title: Uber — 成長至上主義と組織文化の代償
  theme: 成長至上主義と組織文化の代償
  industry: モビリティ
  era: 2009〜現在
  level: advanced
  summary: '世界中でタクシー産業を破壊する急成長を遂げ、

    モビリティの概念そのものを変革したが、

    「勝つためなら何でもやる」という攻撃的な文化が

    ハラスメント問題・規制当局との対立・社内の混乱を引き起こした。

    創業者CEO退任後、新CEOのもとで文化再建に着手し、持続可能な成長モデルへの転換を図った。

    '
  key_questions:
  - Uberの急成長を支えた文化が、なぜ同時に組織崩壊の原因にもなったのか？
  - 成長速度と組織文化の健全性を両立するには、何が必要か？
  - CEO交代後の文化再建は、具体的にどのような施策で進められたか？
  applicable_frameworks:
  - F-7S
  - F-STAR-MODEL
  - F-KOTTER
  - F-PSYCH-SAFETY
  - F-SERVANT
  learning_points:
  - 成長の速度と文化の健全性は両立が必要 — 短期の成長が長期の持続性を毀損する罠
  - 「何のために勝つのか」がなければ組織は壊れる — パーパスなき成長は暴走する
  - 文化再建は仕組みの変更だけでは不十分、リーダーの行動変容が必要 — トップの姿勢が全てを決める
- id: CASE-THERANOS
  seq: 30
  title: Theranos — ビジョン先行の罠と技術の不在
  theme: ビジョン先行の罠
  industry: ヘルスケア
  era: 2003〜2018
  level: advanced
  summary: '「指先一滴の血液で200以上の検査が可能」というビジョンで

    評価額90億ドルを獲得し、シリコンバレーの寵児となった。

    しかし中核技術は未完成のまま製品を出荷し、

    検査結果の不正確さが患者の健康を危険に晒した。

    最終的に詐欺で起訴され、創業者エリザベス・ホームズが有罪判決を受けた。

    '
  key_questions:
  - Theranosが評価額90億ドルを獲得できた構造的要因は何か？
  - 技術的裏付けのないビジョンがなぜ長期間検証されなかったのか？
  - 投資家・取締役会・規制当局の誰が、どの時点で止めるべきだったか？
  applicable_frameworks:
  - F-PMF
  - F-LEAN-CANVAS
  - F-VRIO
  - F-UNIT-ECON
  - F-SCENARIO
  learning_points:
  - ビジョンは大事だが技術的裏付けなき拡大は詐欺と紙一重 — 実現可能性の検証を怠らない
  - PMFの検証を飛ばしたスケールは崩壊する — 市場適合前の拡大は砂上の楼閣
  - ガバナンスと外部監査が機能しない組織は自浄できない — 独立した監視の仕組みが生命線
